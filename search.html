<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyAnime — Результаты поиска</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="search">
    <header class="main-header">
        <div class="header-top-wrapper">
            <div class="header-content">
                <div class="header-top">
                    
                    <div class="header-left">
                        <a href="index.html" class="logo-section">
                            <img src="Assets/Cyanime.jpg" class="logo-img" alt="Logo">
                            <div class="logo-text">Cy<span>Anime</span></div>
                        </a>
                        <button class="btn-cyan">🍿 Смотрю</button>
                    </div>

                    <div class="header-right">
                        <div class="user-section">
                            <div id="auth-block">
                                <button class="auth-btn" onclick="toggleAuth()">Войти</button>
                            </div>
                            <button class="icon-btn">
                                <img src="Assets/bell.png" class="header-icon" alt="Bell">
                            </button>
                        </div>
                        
                        <div class="settings-section">
                            <button id="theme-btn" class="theme-toggle">
                                <img src="Assets/sun.png" class="sun-icon header-icon" alt="Sun">
                                <img src="Assets/Moon.png" class="moon-icon header-icon" alt="Moon" style="display:none;">
                            </button>
                            <button class="icon-btn">
                                <img src="Assets/settings.png" class="header-icon" alt="Settings">
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
        
        <div class="header-bottom-wrapper">
            <div class="header-content">
                <div class="header-bottom">
                    <div class="search-box">
                        <input type="text" placeholder="Поиск аниме..." id="search-input">
                    </div>
                    <nav class="nav-tabs">
                        <a href="index.html?tab=ongoing" class="nav-link" id="tab-ongoing">Смотрят сейчас</a>
                        <a href="index.html?tab=popular" class="nav-link" id="tab-popular">Популярное</a>
                    </nav>
                    <div class="action-buttons">
                        <button class="btn-filter">⚡ Фильтры</button>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <main class="container">
        <h2 class="section-title">Результаты поиска</h2>
        <div id="anime-list" class="anime-grid">
            </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
