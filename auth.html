<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация - CyAnime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Assets/favicon.png">
</head>
<body data-page="auth">
    <header id="main-header" class="main-header"></header>
    
    <main class="container auth-page-main">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="login-tab" class="auth-tab active" onclick="switchAuth('login')">Вход</button>
                <button id="reg-tab" class="auth-tab" onclick="switchAuth('reg')">Регистрация</button>
            </div>
            
            <form id="auth-form" class="auth-form">
                <div class="input-group">
                    <input type="email" id="auth-email" name="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="auth-pass" name="password" autocomplete="current-password" placeholder="Пароль" required>
                </div>
                <button type="submit" id="auth-submit" class="btn-cyan auth-submit-btn">Поехали!</button>
            </form>

            <div class="auth-divider">
                <span>или</span>
            </div>

            <button type="button" id="google-auth" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
                Войти через Google
            </button>
        </div>
    </main>
    
    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="header.js"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
