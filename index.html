<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyAnime — Смотрят сейчас</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Assets/favicon.png">
</head>
<body data-page="ongoing">
    <header id="main-header" class="main-header"></header>
    
    <main class="container">
        <div class="section-header">
            <h2 class="section-title">Смотрят сейчас в CyAnime</h2>
            <button class="btn-filter-main" id="open-filters">⚡ Фильтры</button>
        </div>

        <div id="anime-list" class="anime-grid">
            </div>
    </main>

    <div id="filter-overlay" class="filter-overlay"></div>
    <aside id="filter-aside" class="filter-aside">
        <div class="filter-header">
            <h3>Настройки поиска</h3>
            <button id="close-filters">&times;</button>
        </div>
        
        <div class="filter-content">
            <div class="filter-group">
                <label>Тип контента</label>
                <select id="filter-type">
                    <option value="anime-serial,anime">Всё аниме</option>
                    <option value="anime-serial">Только сериалы</option>
                    <option value="anime">Только фильмы</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Год выпуска</label>
                <input type="number" id="filter-year" placeholder="Напр: 2024" min="1990" max="2026">
            </div>

            <div class="filter-group">
                <label>Статус</label>
                <div class="checkbox-stack">
                    <label class="check-item">
                        <input type="checkbox" id="status-ongoing"> 
                        <span>Онгоинг (выходит)</span>
                    </label>
                    <label class="check-item">
                        <input type="checkbox" id="status-released"> 
                        <span>Завершён</span>
                    </label>
                </div>
            </div>

            <button id="apply-filters" class="auth-submit-btn">Применить фильтры</button>
            <button id="reset-filters" class="btn-filter-main" style="width:100%; margin-top:10px; border-color:rgba(128,128,128,0.2)">Сбросить всё</button>
        </div>
    </aside>
    
    <footer style="text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1);">
        <p style="color: #888; font-size: 14px;">&copy; 2026 CyAnime Project</p>
        <a href="privacy.html" style="color: #aaa; text-decoration: none; font-size: 14px;">Privacy Policy</a>
    </footer>

    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="header.js"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="auth.js"></script> 
</body>
</html>
