<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История просмотров — CyAnime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Assets/favicon.png">
</head>
<body data-page="history">
    <header class="main-header">
        <div class="header-top-wrapper">
            <div class="header-content">
                <div class="header-top">
                    <div class="header-left">
                        <a href="index.html" class="logo-section">
                            <img src="Assets/Cyanime.jpg" class="logo-img" alt="Logo">
                            <div class="logo-text">Cy<span>Anime</span></div>
                        </a>
                        <a href="history.html" class="btn-cyan eye-btn active" title="Смотрю">
                            <img src="Assets/eye.png" alt="Смотрю" class="eye-icon">
                        </a>
                    </div>

                    <div class="header-right">
                        <div class="user-section">
                            <div id="auth-block">
                                </div>
                            <button class="icon-btn">
                                <img src="Assets/bell.png" class="header-icon" alt="Bell">
                            </button>
                        </div>
                        
                        <div class="settings-section">
                            <button id="theme-btn" class="theme-toggle">
                                <img src="Assets/sun.png" class="sun-icon header-icon" alt="Sun">
                                <img src="Assets/Moon.png" class="moon-icon header-icon" alt="Moon" style="display:none;">
                            </button>
                            <button class="icon-btn">
                                <img src="Assets/settings.png" class="header-icon" alt="Settings">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="header-bottom-wrapper">
            <div class="header-content">
                <div class="header-bottom">
                    <div class="search-box">
                        <input type="text" placeholder="Поиск в истории..." id="search-history">
                    </div>
                    <nav class="nav-tabs">
                        <a href="index.html?tab=ongoing" class="nav-link">Смотрят сейчас</a>
                        <a href="index.html?tab=popular" class="nav-link">Популярное</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    
    <main class="container">
        <div class="section-header">
            <h2 class="section-title">Ваша история просмотров</h2>
        </div>

        <div id="history-list" class="history-column">
            <div class="loading-text">Загружаем вашу историю...</div>
        </div>
    </main>
    
    <script type="module" src="history.js"></script>
    <script src="script.js"></script>
    <script type="module" src="firebase-check.js"></script>
</body>
</html>
