<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyAnime — Просмотр</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .anime-info-header { margin: 30px 0; }
        .anime-title { font-size: 2.2rem; color: #fff; margin: 0 0 10px 0; font-weight: 700; line-height: 1.2; }
        .anime-meta { color: var(--accent-color); font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        
        .main-grid { display: grid; grid-template-columns: 280px 1fr; gap: 30px; margin-bottom: 40px; }
        .poster-side img { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .content-side { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .synopsis { line-height: 1.7; color: #bbb; font-size: 1rem; margin-bottom: 20px; }

        .translations-section { margin-top: 25px; }
        .translation-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        
        .player-section { margin-top: 30px; padding-bottom: 50px; }
        .player-container { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5); border: 1px solid #222;
        }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 850px) { 
            .main-grid { grid-template-columns: 1fr; gap: 20px; } 
            .poster-side { display: none; } 
            .anime-title { font-size: 1.6rem; }
            .content-side { padding: 15px; }
            .player-container { border-radius: 0; margin-left: -15px; width: calc(100% + 30px); }
        }
    </style>
</head>
<body data-page="player">

    <header class="main-header">
        <div class="header-top-wrapper">
            <div class="header-content">
                <div class="header-top">
                    <div class="header-left">
                        <a href="index.html" class="logo-section">
                            <img src="Assets/Cyanime.jpg" class="logo-img" alt="Logo">
                            <div class="logo-text">Cy<span>Anime</span></div>
                        </a>
                        <button class="btn-cyan eye-btn" title="Смотрю">
                            <img src="Assets/eye.png" alt="Смотрю" class="eye-icon">
                        </button>
                    </div>
                    <div class="header-right">
                        <div class="user-section">
                            <div id="auth-block">
                                <button class="auth-btn login-btn" onclick="toggleAuth()" title="Войти">
                                    <img src="Assets/login.png" alt="Войти" class="login-icon">
                                </button>
                            </div>
                            <button class="icon-btn"><img src="Assets/bell.png" class="header-icon" alt="Bell"></button>
                        </div>
                        <div class="settings-section">
                            <button id="theme-btn" class="theme-toggle">
                                <img src="Assets/sun.png" class="sun-icon header-icon" alt="Sun">
                                <img src="Assets/Moon.png" class="moon-icon header-icon" alt="Moon" style="display:none;">
                            </button>
                            <button class="icon-btn"><img src="Assets/settings.png" class="header-icon" alt="Settings"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="anime-info-header">
            <div id="meta" class="anime-meta">Загрузка...</div>
            <h1 id="title" class="anime-title">Загрузка тайтла...</h1>
        </div>

        <div class="main-grid">
            <div class="poster-side">
                <img id="poster" src="Assets/Cyanime.jpg" alt="Постер">
            </div>
            <div class="content-side">
                <h3 style="margin-top:0; color: var(--accent-color);">Сюжет</h3>
                <div id="description" class="synopsis">Получаем данные...</div>
                
                <div class="translations-section">
                    <h4 style="color: #fff; margin-bottom: 10px;">Выберите озвучку:</h4>
                    <div id="translation-list" class="translation-buttons">
                        </div>
                </div>
            </div>
        </div>

        <div class="player-section">
            <div class="player-container">
                <iframe id="main-iframe" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="watch.js"></script>
</body>
</html>
