<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyAnime — Просмотр</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Специфичные стили для страницы плеера */
        .anime-info-header { margin-bottom: 30px; margin-top: 30px; }
        .anime-title { font-size: 2.2rem; color: #fff; margin: 0 0 10px 0; font-weight: 700; }
        .anime-meta { color: var(--accent-color); font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        
        .main-grid { display: grid; grid-template-columns: 280px 1fr; gap: 30px; margin-bottom: 40px; }
        .poster-side img { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .content-side { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .synopsis { line-height: 1.7; color: #bbb; font-size: 1rem; }

        .player-section { margin-top: 30px; padding-bottom: 50px; }
        .player-container { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5); border: 1px solid #222;
        }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 850px) { 
            .main-grid { grid-template-columns: 1fr; } 
            .poster-side { display: none; } 
            .anime-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body data-page="player">

    <header class="main-header">
        <div class="header-top-wrapper">
            <div class="header-content">
                <div class="header-top">
                    <div class="header-left">
                        <a href="index.html" class="logo-section">
                            <img src="Assets/Cyanime.jpg" class="logo-img" alt="Logo">
                            <div class="logo-text">Cy<span>Anime</span></div>
                        </a>
                        <button class="btn-cyan">🍿 Смотрю</button>
                    </div>
                    <div class="header-right">
                        <div class="user-section">
                            <div id="auth-block"><button class="auth-btn" onclick="toggleAuth()">Войти</button></div>
                            <button class="icon-btn"><img src="Assets/bell.png" class="header-icon" alt="Bell"></button>
                        </div>
                        <div class="settings-section">
                            <button id="theme-btn" class="theme-toggle">
                                <img src="Assets/sun.png" class="sun-icon header-icon" alt="Sun">
                                <img src="Assets/Moon.png" class="moon-icon header-icon" alt="Moon" style="display:none;">
                            </button>
                            <button class="icon-btn"><img src="Assets/settings.png" class="header-icon" alt="Settings"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="header-bottom-wrapper">
            <div class="header-content">
                <div class="header-bottom">
                    <div class="search-box">
                        <input type="text" placeholder="Поиск аниме..." id="search-input">
                    </div>
                    <nav class="nav-tabs">
                        <a href="index.html?tab=ongoing" class="nav-link">Смотрят сейчас</a>
                        <a href="index.html?tab=popular" class="nav-link">Популярное</a>
                    </nav>
                    <div class="action-buttons">
                        <button class="btn-filter">⚡ Фильтры</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="anime-info-header">
            <div id="meta" class="anime-meta">Синхронизация...</div>
            <h1 id="title" class="anime-title">Загрузка тайтла...</h1>
        </div>

        <div class="main-grid">
            <div class="poster-side">
                <img id="poster" src="Assets/Cyanime.jpg" alt="Постер">
            </div>
            <div class="content-side">
                <h3 style="margin-top:0; color: var(--accent-color);">Сюжет</h3>
                <div id="description" class="synopsis">Получаем данные из базы...</div>
            </div>
        </div>

        <div class="player-section">
            <div class="player-container">
                <iframe id="main-iframe" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const wParams = new URLSearchParams(window.location.search);
        const wId = wParams.get('id'); 

        async function init() {
            if (!wId) return;
            try {
                const r = await fetch(`https://kodikapi.com/search?token=cc25b08a2d09435ad1818ce358fd407d&id=${wId}&with_material_data=true`);
                const d = await r.json();
                
                if (d.results?.length > 0) {
                    const a = d.results[0];
                    const m = a.material_data || {};
                    
                    document.getElementById('title').innerText = m.anime_title || a.title;
                    document.getElementById('meta').innerText = `${a.type} | ${m.shikimori_rating || 0} ★ | ${m.year || a.year}`;
                    document.getElementById('description').innerText = m.description || "Описания нет.";
                    if (m.poster_url) document.getElementById('poster').src = m.poster_url;
                    
                    // ЛОГИКА ПАМЯТИ И ПЕРВОЙ СЕРИИ
                    const savedEpisode = localStorage.getItem(`ep_${wId}`);
                    let finalLink = a.link.startsWith('http') ? a.link : `https:${a.link}`;
                    
                    // Если есть сохраненная серия — прыгаем на неё, иначе строго на 1-ю
                    const episodeToLoad = savedEpisode ? savedEpisode : "1";
                    finalLink += (finalLink.includes('?') ? '&' : '?') + `episode=${episodeToLoad}`;

                    document.getElementById('main-iframe').src = finalLink;
                }
            } catch (e) { console.error("Ошибка загрузки:", e); }
        }

        // Слушаем плеер для сохранения текущей серии
        window.addEventListener('message', (event) => {
            if (event.data.key === 'kodik_player_video_info') {
                const ep = event.data.value.episode;
                if (ep) {
                    localStorage.setItem(`ep_${wId}`, ep);
                }
            }
        });

        init();
    </script>
</body>
</html>
