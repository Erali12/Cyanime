<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyAnime — Player</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --accent: #00ffff; --bg: #0b0b0b; --surface: #121212; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; }
        .wrapper { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .anime-info-header { margin-bottom: 30px; }
        .anime-title { font-size: 2rem; color: #fff; margin: 0 0 10px 0; font-weight: 700; }
        .anime-meta { color: var(--accent); font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }

        .main-grid { display: grid; grid-template-columns: 280px 1fr; gap: 30px; margin-bottom: 40px; }
        .poster-side img { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .content-side { background: var(--surface); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .synopsis { line-height: 1.7; color: #bbb; font-size: 1rem; }

        .player-section { margin-top: 30px; }
        .player-container { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1); border: 1px solid #222;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .mirror-switcher { display: flex; gap: 10px; margin-top: 15px; }
        .m-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #777; 
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .m-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 255, 0.05); }

        @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } .poster-side { display: none; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="anime-info-header">
        <div id="meta" class="anime-meta">Синхронизация...</div>
        <h1 id="title" class="anime-title">Загрузка тайтла...</h1>
    </div>

    <div class="main-grid">
        <div class="poster-side">
            <img id="poster" src="Assets/Cyanime.jpg" alt="Постер">
        </div>
        <div class="content-side">
            <h3 style="margin-top:0; color: var(--accent);">Сюжет</h3>
            <div id="description" class="synopsis">Получаем данные из базы Kodik...</div>
        </div>
    </div>

    <div class="player-section">
        <div class="player-container">
            <iframe id="main-iframe" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
        </div>
        <div class="mirror-switcher" id="mirrors">
            <button class="m-btn active" onclick="switchMirror('kodik.info', this)">Источник 1</button>
            <button class="m-btn" onclick="switchMirror('aniqit.com', this)">Источник 2</button>
            <button class="m-btn" onclick="switchMirror('vli.ph', this)">Источник 3</button>
        </div>
    </div>
</div>

<script>
    const KODIK_TOKEN = 'cc25b08a2d09435ad1818ce358fd407d';
    const urlParams = new URLSearchParams(window.location.search);
    
    // Получаем ID, который мы передали из основного списка
    const animeId = urlParams.get('id'); 
    let baseVideoLink = ""; // Здесь будет храниться оригинальная ссылка на плеер

    async function initPage() {
        if (!animeId) {
            document.getElementById('title').innerText = "Ошибка: ID не найден";
            return;
        }

        try {
            // Запрашиваем данные напрямую у Kodik по ID
            // search?id=...&with_material_data=true дает нам ВСЁ: и плеер, и описание, и постер
            const response = await fetch(`https://kodikapi.com/search?token=${KODIK_TOKEN}&id=${animeId}&with_material_data=true`);
            const data = await response.json();

            if (data.results && data.results.length > 0) {
                const anime = data.results[0];
                const material = anime.material_data || {};

                // 1. Заполняем текст и инфо
                document.getElementById('title').innerText = material.anime_title || anime.title;
                document.getElementById('meta').innerText = `${anime.type.replace('-', ' ')} | ${material.shikimori_rating || '0'} ★ | ${material.year || anime.year}`;
                document.getElementById('description').innerText = material.description || "Описание временно отсутствует.";
                
                // 2. Ставим постер
                if (material.poster_url) {
                    document.getElementById('poster').src = material.poster_url;
                }

                // 3. Сохраняем ссылку на видео и загружаем плеер
                baseVideoLink = anime.link;
                loadIframe(baseVideoLink);
            } else {
                document.getElementById('title').innerText = "Аниме не найдено в базе";
            }
        } catch (e) {
            console.error("Ошибка CyAnime HQ:", e);
            document.getElementById('description').innerText = "Произошла ошибка при загрузке данных.";
        }
    }

    function loadIframe(link) {
        if (!link) return;
        // Добавляем протокол, если его нет
        const finalLink = link.startsWith('http') ? link : `https:${link}`;
        document.getElementById('main-iframe').src = finalLink;
    }

    // Функция смены зеркал (очень важно для стабильности в Казахстане)
    function switchMirror(domain, btn) {
        if (!baseVideoLink) return;

        // Меняем домен в ссылке (например, kodik.info -> aniqit.com)
        const newLink = baseVideoLink.replace(/kodik\.info|aniqit\.com|vli\.ph/g, domain);
        loadIframe(newLink);

        // Активная кнопка
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    initPage();
</script>

</body>
</html>
