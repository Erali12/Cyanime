<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки профиля — CyAnime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Assets/favicon.png">
</head>
<body data-page="settings">
    <header id="main-header" class="main-header"></header>
    
    <main class="container">
        <div class="section-header">
            <h2 class="section-title">Настройки профиля</h2>
        </div>

        <div class="settings-card">
            <div class="settings-top">
                <div class="avatar-upload">
                    <img id="settings-avatar" src="Assets/user-avatar.png" alt="Avatar">
                    <label for="avatar-input" class="change-avatar-btn">📷</label>
                    <input type="file" id="avatar-input" accept="image/*" hidden>
                </div>
                <div class="user-info-main">
                    <h3 id="settings-username">Загрузка...</h3>
                    <p id="settings-email">email@example.com</p>
                </div>
            </div>

            <div class="settings-grid">
                <div class="settings-item">
                    <label>Ваш возраст</label>
                    <input type="number" id="settings-age" min="1" max="120" placeholder="Укажите возраст">
                </div>
                <div id="password-change-block" class="settings-item" style="display: none;">
                    <label>Безопасность</label>
                    <button class="auth-submit-btn" id="btn-change-pass">Сменить пароль</button>
                </div>
            </div>
            
            <button id="save-settings" class="auth-submit-btn" style="margin-top: 25px;">Сохранить настройки</button>
        </div>
    </main>
    
    <script type="module" src="supabase-config.js"></script>
    
    <script type="module" src="header.js"></script>
    
    <script type="module" src="script.js"></script>
    
    <script type="module" src="settings.js"></script>
</body>
</html>
